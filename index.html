<!-- Scripts -->
<script>
// Navigation & tab functionality (existing code)
function selectTag(el, tag) {
  document.querySelectorAll('.search-tag').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
}

function openTab(el, tabId) {
  document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(tabId).classList.add('on');
}

function toggleWa() {
  const popup = document.getElementById('waPopup');
  const fab = document.getElementById('waFab');
  const label = document.getElementById('waLabel');
  popup.classList.toggle('open');
  fab.classList.toggle('opened');
  if (label) label.classList.add('hidden');
}

function waChat(msg) {
  const waLink = `https://wa.me/919172712982?text=${encodeURIComponent(msg)}`;
  window.open(waLink, '_blank');
}

// Cursor effect
const cur = document.getElementById('cur');
const curR = document.getElementById('cur-r');
document.addEventListener('mousemove', (e) => {
  if (cur) {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
  }
  if (curR) {
    curR.style.left = e.clientX + 'px';
    curR.style.top = e.clientY + 'px';
  }
});

document.addEventListener('mouseenter', () => {
  if (cur) cur.classList.add('h');
});

document.addEventListener('mouseleave', () => {
  if (cur) cur.classList.remove('h');
});
</script>
